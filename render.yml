services:
  - type: web
    name: knowledge-assistant
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: HF_API_TOKEN
        sync: false
      - key: LOG_LEVEL
        value: info